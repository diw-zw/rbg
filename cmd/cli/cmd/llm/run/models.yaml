# TODO: Add more models and modes
- id: "Qwen/Qwen3.5-0.8B"
  name: "Qwen 3.5 0.8B"
  modes:
    - name: standard
      description: "Balanced performance and resource usage"
      engine: vllm
      image: vllm/vllm-openai:nightly
      resources:
        nvidia.com/gpu: "1"
        cpu: "4"
        memory: "16Gi"
      args:
        - "--tensor-parallel-size=1"
        - "--max-model-len=8192"
      env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"

    - name: throughput
      description: "Maximize throughput, suitable for batch inference"
      engine: vllm
      image: vllm/vllm-openai:nightly
      resources:
        nvidia.com/gpu: "2"
        cpu: "8"
        memory: "32Gi"
      args:
        - "--tensor-parallel-size=2"
        - "--max-model-len=16384"
        - "--gpu-memory-utilization=0.95"
        - "--enable-chunked-prefill"

    - name: latency
      description: "Minimize latency, suitable for real-time inference"
      engine: sglang
      image: lmsysorg/sglang:latest
      resources:
        nvidia.com/gpu: "1"
        cpu: "4"
        memory: "16Gi"
      args:
        - "--mem-fraction-static=0.8"
        - "--max-prefill-tokens=16384"

    # TODO: test only, remove later
    - name: distributed-tp2
      description: "Distributed inference with tensor parallel size 2 on 2 nodes"
      engine: sglang
      image: lmsysorg/sglang:latest
      resources:
        nvidia.com/gpu: "1"
        cpu: "4"
        memory: "16Gi"
      args:
        - "--tp-size=2"
      distributed:
        size: 2
      shmSize: "2Gi"
